<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChoiceScript IDE</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/tabs.css">
<link rel="stylesheet" href="css/editor.css">
<link rel="stylesheet" href="css/linenumbers.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/search.css">
<link rel="stylesheet" href="css/reference.css">
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="logo">CS·IDE</div>
  <div class="sep"></div>
  <input id="filename-input" type="text" value="scene" placeholder="filename" spellcheck="false" />
  <button onclick="FileManager.exportFile()">Export</button>
  <button onclick="FileManager.exportAll()" title="Download all tabs as .txt files">Export All</button>
  <button onclick="document.getElementById('file-input').click()">Import</button>
  <button onclick="document.getElementById('file-input-new').click()" title="Import into a new tab">Import → New Tab</button>
  <input type="file" id="file-input"     accept=".txt" onchange="FileManager.importFile(event)" style="display:none" />
  <input type="file" id="file-input-new" accept=".txt" onchange="FileManager.importAsNewTab(event)" style="display:none" />
  <input type="file" id="project-input"  accept=".json" onchange="Project.importProject(event)" style="display:none" />
  <div class="sep"></div>
  <button onclick="Project.exportProject()" title="Save project manifest (.json)">Save Project</button>
  <button onclick="document.getElementById('project-input').click()" title="Load scenes from a project manifest">Load Project</button>
  <div id="save-status">—</div>
  <button id="ref-open-btn" title="Open command reference">? Reference</button>
  <div class="spacer"></div>
  <div id="font-size-control">
    <button onclick="FontSize.decrease()" title="Decrease font size">−</button>
    <span id="font-size-val">14</span>
    <button onclick="FontSize.increase()" title="Increase font size">+</button>
  </div>
  <div class="sep"></div>
  <div id="word-count" title="Hover for total across all tabs">Scene: <span id="wc-num">0</span> / Total: <span id="wc-total">0</span> words</div>
</div>

<!-- TAB STRIP -->
<div id="tab-strip"></div>

<!-- SNIPPET BAR -->
<div id="snippet-bar">
  <div class="sn-label">Snippets</div>
  <button onclick="Snippets.insert('choice')">*choice</button>
  <button onclick="Snippets.insert('fake_choice')">*fake_choice</button>
  <button onclick="Snippets.insert('if')">*if / *else</button>
  <button onclick="Snippets.insert('stat_chart')">*stat_chart</button>
  <button onclick="Snippets.insert('selectable_if')">*selectable_if</button>
  <button onclick="Snippets.insert('temp')">*temp</button>
  <button onclick="Snippets.insert('gosub')">*gosub_scene</button>
</div>

<!-- SEARCH PANEL -->
<div id="search-panel">
  <div class="search-row">
    <input type="text" id="search-input" placeholder="Find…" spellcheck="false" />
    <button id="search-prev" title="Previous match (Shift+Enter)">↑</button>
    <button id="search-next" title="Next match (Enter)">↓</button>
    <span id="search-status" class="search-status"></span>
    <label class="search-option"><input type="checkbox" id="search-case" /> Aa</label>
    <label class="search-option"><input type="checkbox" id="search-regex" /> .*</label>
    <button id="search-close" title="Close (Esc)">×</button>
  </div>
  <div class="search-row">
    <input type="text" id="replace-input" placeholder="Replace…" spellcheck="false" />
    <button id="search-replace-btn">Replace</button>
    <button id="search-replace-all">Replace All</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="panel" style="flex:1.6">
      <div class="panel-header" id="issues-header">Issues <span class="count" id="issue-count">0</span></div>
      <div class="panel-body" id="issue-list"><div class="empty-state">No issues found</div></div>
    </div>
    <div class="panel" style="flex:0.7">
      <div class="panel-header">Sections <span class="count" id="section-count">0</span></div>
      <div class="panel-body" id="section-list"><div class="empty-state">No sections found</div></div>
    </div>
    <div class="panel" style="flex:1">
      <div class="panel-header">Labels <span class="count" id="label-count">0</span></div>
      <div class="panel-body" id="label-list"><div class="empty-state">No labels found</div></div>
    </div>
    <div class="panel" style="flex:0.8">
      <div class="panel-header">Variables <span class="count" id="var-count">0</span></div>
      <div class="panel-body" id="var-list"><div class="empty-state">No variables found</div></div>
    </div>
  </div>

  <!-- EDITOR -->
  <div id="editor-wrap">
    <div id="line-gutter"></div>
    <div id="editor"
      contenteditable="true"
      spellcheck="false"
      inputmode="text"
      autocorrect="off"
      autocapitalize="off"
    ></div>
  </div>

</div>

<!-- JS modules — dependency order matters -->
<script src="js/caret.js"></script>
<script src="js/linter.js"></script>
<script src="js/crossscene.js"></script>
<script src="js/undo.js"></script>
<script src="js/linenumbers.js"></script>
<script src="js/highlight.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/filemanager.js"></script>
<script src="js/snippets.js"></script>
<script src="js/search.js"></script>
<script src="js/editor.js"></script>
<script src="js/tabs.js"></script>
<script>
// ── Font size control (tiny, inline since it's 10 lines) ──────────────
const FontSize = (() => {
  const MIN = 10, MAX = 24;
  let size = parseInt(localStorage.getItem('cs-ide-fontsize') || '14');

  function apply() {
    document.getElementById('editor').style.fontSize = size + 'px';
    document.getElementById('line-gutter').style.fontSize = size + 'px';
    document.getElementById('font-size-val').textContent = size;
    localStorage.setItem('cs-ide-fontsize', size);
    // Force re-render of gutter so line heights stay aligned after font change
    if (typeof LineNumbers !== 'undefined') LineNumbers.forceUpdate();
  }
  function increase() { if (size < MAX) { size++; apply(); } }
  function decrease() { if (size > MIN) { size--; apply(); } }

  window.addEventListener('DOMContentLoaded', apply);
  return { increase, decrease };
})();
</script>
<script src="js/folding.js"></script>
<script src="js/project.js"></script>
<script src="js/reference.js"></script>
<script src="js/main.js"></script>

</body>
</html>
